name: app_clinica_estetica
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  supabase_flutter: ^2.12.0
  url_launcher: ^6.3.1
  # google_sign_in removido
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_staggered_animations: ^1.0.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  connectivity_plus: ^6.1.1
  shared_preferences: ^2.5.4
  fl_chart: ^0.70.2
  pdf: ^3.12.0
  printing: ^5.14.3
  webview_flutter: ^4.13.1
  webview_flutter_web: ^0.2.3+4
  mask_text_input_formatter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
